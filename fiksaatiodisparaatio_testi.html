<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fiksaatiodisparaatiotesti</title>
  <style>
    :root {
      --app-bg: #000000;
      --panel: #101010;
      --text: #f2f2f2;
      --muted: #b8b8b8;
      --border: #3a3a3a;
      --bar-red: #e20000;
      --bar-green: #009d00;

      --line-200mm-px: 200px;
      --target-size-px: 220px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--app-bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px;
    }

    .verify-line-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .verify-line {
      width: var(--line-200mm-px);
      height: 4px;
      background: #ffffff;
      border-radius: 999px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 12px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 14px;
    }

    button {
      appearance: none;
      border: 1px solid #5a5a5a;
      background: #202020;
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
    }

    button:hover { background: #2a2a2a; }
    button:active { transform: translateY(1px); }

    .stage {
      min-height: 72vh;
      background: #000000;
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 24px;
      transition: background-color 0.15s ease;
    }

    .stage.bg-white {
      background: #ffffff;
    }

    .figure-host {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: calc(72vh - 48px);
      outline: none;
      position: relative;
    }

    .figure {
      display: none;
      user-select: none;
      -webkit-user-drag: none;
      flex: 0 0 auto;
    }

    .figure.active {
      display: block;
    }

    .round-figure {
      width: var(--target-size-px);
      height: var(--target-size-px);
    }

    dialog {
      border: 1px solid #4a4a4a;
      border-radius: 14px;
      padding: 0;
      width: min(92vw, 540px);
      background: #111;
      color: var(--text);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.7);
    }

    .dialog-inner {
      padding: 18px;
    }

    .dialog-inner h2 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    .help {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
      margin-bottom: 14px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-weight: 700;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #666;
      background: #1b1b1b;
      color: var(--text);
    }

    .error {
      color: #ff8080;
      min-height: 1.2em;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 8px;
    }

    @media (max-width: 860px) {
      .stage {
        min-height: 62vh;
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="verify-line-wrap">
      <div class="verify-line" id="verifyLine" aria-label="200 mm tarkistusviiva"></div>
    </div>

    <div class="toolbar">
      <button id="prevImage" type="button">← Edellinen</button>
      <button id="nextImage" type="button">Seuraava →</button>
      <button id="openCalibration" type="button">Kalibroi</button>
    </div>

    <div class="stage">
      <div class="figure-host" id="figureHost" tabindex="0" aria-label="Testikuva-alue">

        <svg id="figure1" class="figure round-figure active" viewBox="0 0 512 512" aria-label="Kuva 1 – Mallet pysty">
          <defs>
            <clipPath id="cp1">
              <circle cx="256" cy="256" r="240"/>
            </clipPath>
          </defs>
          <g transform="rotate(-90, 256, 256)">
            <circle cx="256" cy="256" r="240" fill="#000000"/>
            <rect x="210" y="33" width="92" height="446" fill="#ffffff"/>
            <rect x="250.5" y="224" width="11" height="64" fill="#000000"/>
            <rect x="224" y="250.5" width="64" height="11" fill="#000000"/>
            <rect x="228" y="100.5" width="56" height="56" fill="#000000"/>
            <rect x="239" y="111.5" width="34" height="34" fill="#ffffff"/>
            <rect x="228" y="355.5" width="56" height="56" fill="#000000"/>
            <rect x="239" y="366.5" width="34" height="34" fill="#ffffff"/>
            <g class="bar-green"><rect x="42" y="237" width="152" height="38"/></g>
            <g class="bar-red"><rect x="318" y="237" width="152" height="38"/></g>
          </g>
        </svg>

        <svg id="figure2" class="figure round-figure" viewBox="0 0 512 512" aria-label="Kuva 2 – Mallet vaaka">
          <defs>
            <clipPath id="cp2">
              <circle cx="256" cy="256" r="240"/>
            </clipPath>
          </defs>
          <g transform="rotate(0, 256, 256)">
            <circle cx="256" cy="256" r="240" fill="#000000"/>
            <rect x="210" y="33" width="92" height="446" fill="#ffffff"/>
            <rect x="250.5" y="224" width="11" height="64" fill="#000000"/>
            <rect x="224" y="250.5" width="64" height="11" fill="#000000"/>
            <rect x="228" y="100.5" width="56" height="56" fill="#000000"/>
            <rect x="239" y="111.5" width="34" height="34" fill="#ffffff"/>
            <rect x="228" y="355.5" width="56" height="56" fill="#000000"/>
            <rect x="239" y="366.5" width="34" height="34" fill="#ffffff"/>
            <g class="bar-green"><rect x="42" y="237" width="152" height="38"/></g>
            <g class="bar-red"><rect x="318" y="237" width="152" height="38"/></g>
          </g>
        </svg>

      </div>
    </div>

  </div>

  <dialog id="calibrationDialog">
    <div class="dialog-inner" id="calibrationForm">
      <h2>Kalibroi</h2>
      <div class="help">
        Jätä kenttä tyhjäksi, jos et halua muuttaa sitä. Selainzoomin tulee olla 100 %.
      </div>

      <div class="field">
        <label for="redR">Punainen R (0–255)</label>
        <input id="redR" type="number" min="0" max="255" step="1" />
      </div>
      <div class="field">
        <label for="redG">Punainen G (0–255)</label>
        <input id="redG" type="number" min="0" max="255" step="1" />
      </div>
      <div class="field">
        <label for="redB">Punainen B (0–255)</label>
        <input id="redB" type="number" min="0" max="255" step="1" />
      </div>

      <div class="field">
        <label for="greenR">Vihreä R (0–255)</label>
        <input id="greenR" type="number" min="0" max="255" step="1" />
      </div>
      <div class="field">
        <label for="greenG">Vihreä G (0–255)</label>
        <input id="greenG" type="number" min="0" max="255" step="1" />
      </div>
      <div class="field">
        <label for="greenB">Vihreä B (0–255)</label>
        <input id="greenB" type="number" min="0" max="255" step="1" />
      </div>

      <div class="field">
        <label for="pxPerMm">Näyttökalibrointi (px/mm)</label>
        <input id="pxPerMm" type="number" min="0.01" step="0.0001" />
      </div>

      <div class="field">
        <label for="viewingDistanceM">Tutkimusetäisyys (m)</label>
        <input id="viewingDistanceM" type="number" min="0.1" step="0.01" />
      </div>

      <div class="error" id="errorText"></div>

      <div class="dialog-actions">
        <button type="button" id="cancelCalibration">Peruuta</button>
        <button type="button" id="saveCalibration">Tallenna</button>
      </div>
    </div>
  </dialog>

  <script>
    const MALLET_DIAMETER_MM = 108;
    const REFERENCE_DISTANCE_M = 5.75;
    const STORAGE_KEY = 'fd_test_calibration_v6';

    const $ = id => document.getElementById(id);
    const figureIds = ['figure1', 'figure2'];
    let currentFigureIndex = 0;

    function clampByte(v) { return Math.max(0, Math.min(255, Math.round(v))); }

    function rgbToHex(r, g, b) {
      const h = n => n.toString(16).padStart(2, '0');
      return '#' + h(r) + h(g) + h(b);
    }

    function captureEnvironment() {
      return {
        innerWidth: window.innerWidth,
        innerHeight: window.innerHeight,
        outerWidth: window.outerWidth,
        outerHeight: window.outerHeight,
        devicePixelRatio: window.devicePixelRatio || 1,
        viewportScale: window.visualViewport ? window.visualViewport.scale : 1,
        screenWidth: window.screen.width,
        screenHeight: window.screen.height
      };
    }

    function isEnvironmentDifferent(saved) {
      if (!saved || !saved.environment) return false;
      const now = captureEnvironment();
      const e = saved.environment;
      return (
        e.innerWidth !== now.innerWidth ||
        e.innerHeight !== now.innerHeight ||
        e.outerWidth !== now.outerWidth ||
        e.outerHeight !== now.outerHeight ||
        Math.abs((e.devicePixelRatio || 1) - (now.devicePixelRatio || 1)) > 0.001 ||
        Math.abs((e.viewportScale || 1) - (now.viewportScale || 1)) > 0.001 ||
        e.screenWidth !== now.screenWidth ||
        e.screenHeight !== now.screenHeight
      );
    }

    function getDefaultCalibration() {
      return {
        red: { r: 226, g: 0, b: 0 },
        green: { r: 0, g: 157, b: 0 },
        pxPerMm: 1,
        viewingDistanceM: 5.75,
        environment: null
      };
    }

    function getSavedCalibration() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return getDefaultCalibration();
        const p = JSON.parse(raw);
        const def = getDefaultCalibration();
        return {
          red: {
            r: clampByte(p.red?.r ?? def.red.r),
            g: clampByte(p.red?.g ?? def.red.g),
            b: clampByte(p.red?.b ?? def.red.b)
          },
          green: {
            r: clampByte(p.green?.r ?? def.green.r),
            g: clampByte(p.green?.g ?? def.green.g),
            b: clampByte(p.green?.b ?? def.green.b)
          },
          pxPerMm: Number(p.pxPerMm) || def.pxPerMm,
          viewingDistanceM: Number(p.viewingDistanceM) || def.viewingDistanceM,
          environment: p.environment || null
        };
      } catch {
        return getDefaultCalibration();
      }
    }

    function saveCalibration(cal) {
      cal.environment = captureEnvironment();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cal));
    }

    function malletDiameterMm(distanceM) {
      return MALLET_DIAMETER_MM * (distanceM / REFERENCE_DISTANCE_M);
    }

    function applyColors(redHex, greenHex) {
      document.querySelectorAll('.bar-red > rect').forEach(el => el.setAttribute('fill', redHex));
      document.querySelectorAll('.bar-green > rect').forEach(el => el.setAttribute('fill', greenHex));
      document.documentElement.style.setProperty('--bar-red', redHex);
      document.documentElement.style.setProperty('--bar-green', greenHex);
    }

    function applyCalibration(cal) {
      const redHex = rgbToHex(cal.red.r, cal.red.g, cal.red.b);
      const greenHex = rgbToHex(cal.green.r, cal.green.g, cal.green.b);
      const pxmm = cal.pxPerMm;
      const dist = cal.viewingDistanceM;

      applyColors(redHex, greenHex);

      document.documentElement.style.setProperty('--line-200mm-px', `${pxmm * 200}px`);

      const malletPhysMm = malletDiameterMm(dist);
      const malletPhysPx = malletPhysMm * pxmm;
      const malletSvgPx = malletPhysPx * (512 / 480);
      document.documentElement.style.setProperty('--target-size-px', `${malletSvgPx}px`);
    }

    function showFigure(index) {
      currentFigureIndex = (index + figureIds.length) % figureIds.length;
      figureIds.forEach((id, i) => {
        $(id).classList.toggle('active', i === currentFigureIndex);
      });

      const stage = document.querySelector('.stage');
      stage.classList.add('bg-white');

      const saved = getSavedCalibration();
      applyCalibration(saved);
    }

    function showNextFigure() { showFigure(currentFigureIndex + 1); }
    function showPrevFigure() { showFigure(currentFigureIndex - 1); }

    $('prevImage').addEventListener('click', showPrevFigure);
    $('nextImage').addEventListener('click', showNextFigure);

    $('openCalibration').addEventListener('click', () => {
      const saved = getSavedCalibration();
      $('redR').value = saved.red.r;
      $('redG').value = saved.red.g;
      $('redB').value = saved.red.b;
      $('greenR').value = saved.green.r;
      $('greenG').value = saved.green.g;
      $('greenB').value = saved.green.b;
      $('pxPerMm').value = saved.pxPerMm;
      $('viewingDistanceM').value = saved.viewingDistanceM;
      $('errorText').textContent = '';
      $('calibrationDialog').showModal();
    });

    $('cancelCalibration').addEventListener('click', () => {
      $('calibrationDialog').close();
    });

    $('saveCalibration').addEventListener('click', () => {
      const saved = getSavedCalibration();

      function readField(id, fallback) {
        const v = $(id).value.trim();
        return v === '' ? fallback : Number(v);
      }

      const red = {
        r: clampByte(readField('redR', saved.red.r)),
        g: clampByte(readField('redG', saved.red.g)),
        b: clampByte(readField('redB', saved.red.b))
      };

      const green = {
        r: clampByte(readField('greenR', saved.green.r)),
        g: clampByte(readField('greenG', saved.green.g)),
        b: clampByte(readField('greenB', saved.green.b))
      };

      const pxPerMm = readField('pxPerMm', saved.pxPerMm);
      const viewingDistanceM = readField('viewingDistanceM', saved.viewingDistanceM);

      if (!(pxPerMm > 0)) {
        $('errorText').textContent = 'px/mm-arvon pitää olla positiivinen luku.';
        return;
      }

      if (!(viewingDistanceM > 0)) {
        $('errorText').textContent = 'Tutkimusetäisyyden pitää olla positiivinen luku metreinä.';
        return;
      }

      const cal = { red, green, pxPerMm, viewingDistanceM };
      saveCalibration(cal);
      applyCalibration(cal);
      $('calibrationDialog').close();
    });

    document.addEventListener('keydown', (event) => {
      if ($('calibrationDialog').open) return;

      if (event.key === 'ArrowRight') {
        event.preventDefault();
        showNextFigure();
      } else if (event.key === 'ArrowLeft') {
        event.preventDefault();
        showPrevFigure();
      }
    });

    if (window.visualViewport) {
    }

    const initial = getSavedCalibration();
    applyCalibration(initial);
    showFigure(0);
    $('figureHost').focus();
  </script>
</body>
</html>
